<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV Anlage Home</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        h1 { color: #ffffff; margin-bottom: 25px; font-weight: 300; letter-spacing: 2px; font-size: 1.5rem; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-title { color: #ffcc00; font-size: 0.7rem; text-transform: uppercase; margin-top: 25px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .device-box { 
            border: 1px solid #333; 
            padding: 10px 15px; 
            border-radius: 15px; 
            margin: 8px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .label { font-size: 0.85rem; color: #888; display: flex; align-items: center; gap: 8px; }
        .value { font-size: 1.2rem; font-weight: 600; color: #ffffff; }
        .unit { font-size: 0.7rem; color: #888; margin-left: 4px; }
        
        /* Status-Farben */
        .active-red { border-color: #ff3b30 !important; color: #ff3b30 !important; }
        .active-green { border-color: #32d74b !important; color: #32d74b !important; }
        .active-blue { border-color: #007aff !important; color: #007aff !important; }
        .active-orange { border-color: #ff9500 !important; color: #ff9500 !important; }
    </style>
</head>
<body>

    <h1>PV ANLAGE HOME</h1>

    <div class="card">
        <div class="section-title">Erzeugung & Netz</div>
        <div class="device-box"><span class="label">☀️ Gesamt</span><div class="value"><span id="gesamt">--</span><span class="unit">W</span></div></div>
        <div class="device-box"><span class="label">🌅 Süd (DC2)</span><div class="value"><span id="sued">--</span><span class="unit">W</span></div></div>
        <div class="device-box"><span class="label">🌇 Nord (DC1)</span><div class="value"><span id="nord">--</span><span class="unit">W</span></div></div>
        <div id="netz-box" class="device-box"><span class="label">🌐 Netzbezug</span><div class="value"><span id="netz">--</span><span class="unit">W</span></div></div>

        <div class="section-title">Verbraucher</div>
        <div id="spuel-box" class="device-box"><span class="label">🍽️ Spülmaschine</span><div class="value"><span id="spuel">--</span><span class="unit">W</span></div></div>
        <div id="wasch-box" class="device-box"><span class="label">👕 Waschmaschine</span><div class="value"><span id="wasch">--</span><span class="unit">W</span></div></div>
        <div id="trockner-box" class="device-box"><span class="label">🧥 Trockner</span><div class="value"><span id="trockner">--</span><span class="unit">W</span></div></div>
        <div id="pumpe-box" class="device-box"><span class="label">💧 Brunnenpumpe</span><div class="value"><span id="pumpe">--</span><span class="unit">W</span></div></div>
        <div id="kaffee-box" class="device-box"><span class="label">☕ Kaffeemaschine</span><div class="value"><span id="kaffee">--</span><span class="unit">W</span></div></div>

        <div class="section-title">Batterie</div>
        <div class="device-box"><span class="label">📊 Ladestand</span><div class="value"><span id="soc">--</span><span class="unit">%</span></div></div>
        <div id="bat_in-box" class="device-box"><span class="label">🔋 Laden</span><div class="value"><span id="bat_in">--</span><span class="unit">W</span></div></div>
        <div id="bat_out-box" class="device-box"><span class="label">🔋 Entladen</span><div class="value"><span id="bat_out">--</span><span class="unit">W</span></div></div>
    </div>

    <script>
        const HA_URL = "https://1cbgsjyyusu6ydzrcy6uaqjcj5wrbyhw.ui.nabu.casa";
        const TOKEN = "HIER_DEINEN_TOKEN_EINFÜGEN"; 

        async function fetchSensor(entityId, elementId, boxId = null, activeClass = "", isPercent = false) {
            try {
                const res = await fetch(`${HA_URL}/api/states/${entityId}`, {
                    headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" }
                });
                const data = await res.json();
                const val = Math.round(parseFloat(data.state || 0));
                document.getElementById(elementId).innerText = val;

                if (boxId) {
                    const box = document.getElementById(boxId);
                    if (boxId === "netz-box") {
                        box.className = "device-box " + (val > 0 ? "active-red" : val < 0 ? "active-green" : "");
                    } else if (activeClass && val > 5) {
                        box.classList.add(activeClass);
                    } else {
                        box.classList.remove(activeClass);
                    }
                }
            } catch (e) { document.getElementById(elementId).innerText = "!"; }
        }

        function updateAll() {
            fetchSensor("sensor.pv_gesamterzeugung", "gesamt");
            fetchSensor("sensor.scb_dc2_power", "sued");
            fetchSensor("sensor.scb_dc1_power", "nord");
            fetchSensor("sensor.scb_grid_power", "netz", "netz-box");
            
            fetchSensor("sensor.0xa4c138e9c794f547_power", "spuel", "spuel-box", "active-orange");
            fetchSensor("sensor.shelly1pmminig3_34b7da8c3c40_power", "wasch", "wasch-box", "active-orange");
            fetchSensor("sensor.shelly1pmminig3_543204521224_power", "trockner", "trockner-box", "active-orange");
            fetchSensor("sensor.shelly1pmminig3_54320456041c_switch_0_power", "pumpe", "pumpe-box", "active-orange");
            fetchSensor("sensor.stecker_06_power", "kaffee", "kaffee-box", "active-orange");

            fetchSensor("sensor.scb_battery_soc", "soc");
            fetchSensor("sensor.scb_pv_to_battery_power", "bat_in", "bat_in-box", "active-blue");
            fetchSensor("sensor.scb_home_power_from_battery", "bat_out", "bat_out-box", "active-blue");
        }
        
        setInterval(updateAll, 10000);
        updateAll();
    </script>
</body>
</html>
