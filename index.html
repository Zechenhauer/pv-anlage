<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV Anlage Home</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        h1 { color: #ffffff; margin-bottom: 25px; font-weight: 300; letter-spacing: 2px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .section-title { color: #ffcc00; font-size: 0.7rem; text-transform: uppercase; margin-top: 25px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .label { font-size: 0.85rem; color: #888; }
        .value { font-size: 1.4rem; font-weight: 600; }
        .unit { font-size: 0.7rem; color: #555; margin-left: 4px; }
        .color-verbrauch { color: #ff9500; }
        .color-erzeugung { color: #32d74b; }
        .color-batterie { color: #007aff; }
    </style>
</head>
<body>

    <h1>PV ANLAGE HOME</h1>

    <div class="card">
        <div class="section-title">Momentanwerte</div>
        <div class="row"><span class="label">Gesamt Erzeugung</span><div class="value color-erzeugung"><span id="gesamt">--</span><span class="unit">W</span></div></div>
        <div class="row"><span class="label">Aktueller Verbrauch</span><div class="value color-verbrauch"><span id="verbrauch">--</span><span class="unit">W</span></div></div>
        <div class="row"><span class="label">Netzbezug Aktuell</span><div class="value color-verbrauch"><span id="netz">--</span><span class="unit">W</span></div></div>
        
        <div class="section-title">Details PV</div>
        <div class="row"><span class="label">Süd (DC2)</span><div class="value color-erzeugung"><span id="sued">--</span><span class="unit">W</span></div></div>
        <div class="row"><span class="label">Nord (DC1)</span><div class="value color-erzeugung"><span id="nord">--</span><span class="unit">W</span></div></div>
        
        <div class="section-title">Batterie</div>
        <div class="row"><span class="label">Laden</span><div class="value color-batterie"><span id="bat_in">--</span><span class="unit">W</span></div></div>
        <div class="row"><span class="label">Entladen</span><div class="value color-batterie"><span id="bat_out">--</span><span class="unit">W</span></div></div>

        <div class="section-title">Statistik</div>
        <div class="row"><span class="label">Netzbezug (Tag)</span><div class="value"><span id="netz_tag">--</span><span class="unit">kWh</span></div></div>
        <div class="row"><span class="label">Netzbezug (Monat)</span><div class="value"><span id="netz_monat">--</span><span class="unit">kWh</span></div></div>
    </div>

    <script>
        const HA_URL = "https://1cbgsjyyusu6ydzrcy6uaqjcj5wrbyhw.ui.nabu.casa";
        const TOKEN = "HIER_DEINEN_TOKEN_EINFÜGEN"; 

        async function fetchSensor(entityId, elementId) {
            try {
                const res = await fetch(`${HA_URL}/api/states/${entityId}`, {
                    headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" }
                });
                const data = await res.json();
                document.getElementById(elementId).innerText = data.state;
            } catch (e) { document.getElementById(elementId).innerText = "!"; }
        }

        function updateAll() {
            fetchSensor("sensor.pv_gesamterzeugung", "gesamt");
            fetchSensor("sensor.scb_ac_power", "verbrauch");
            fetchSensor("sensor.scb_grid_power", "netz");
            fetchSensor("sensor.scb_dc2_power", "sued");
            fetchSensor("sensor.scb_dc1_power", "nord");
            fetchSensor("sensor.scb_pv_to_battery_power", "bat_in");
            fetchSensor("sensor.scb_home_power_from_battery", "bat_out");
            fetchSensor("sensor.scb_home_consumption_from_grid_day", "netz_tag");
            fetchSensor("sensor.scb_home_consumption_from_grid_month", "netz_monat");
        }
        
        setInterval(updateAll, 10000); // Erhöht auf 10s für bessere Performance
        updateAll();
    </script>
</body>
</html>
